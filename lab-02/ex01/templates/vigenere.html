<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vigenere Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">VIGENERE CIPHER</h2>
        
        <div class="card mb-4 border-primary shadow-sm">
            <div class="card-header bg-primary text-white">ENCRYPTION</div>
            <div class="card-body">
                <form method="POST" action="/vigenere/encrypt">
                    <div class="form-group"><label>Plain text:</label>
                        <input type="text" name="inputPlainText" class="form-control" required>
                    </div>
                    <div class="form-group"><label>Key (String):</label>
                        <input type="text" name="inputKey" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Encrypt</button>
                </form>
            </div>
        </div>

        <div class="card border-success shadow-sm">
            <div class="card-header bg-success text-white">DECRYPTION</div>
            <div class="card-body">
                <form method="POST" action="/vigenere/decrypt">
                    <div class="form-group"><label>Cipher text:</label>
                        <input type="text" name="inputCipherText" class="form-control" required>
                    </div>
                    <div class="form-group"><label>Key (String):</label>
                        <input type="text" name="inputKey" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success">Decrypt</button>
                </form>
            </div>
        </div>

        <div class="text-center mt-4"><a href="/" class="btn btn-link">Quay lại trang chủ</a></div>
    </div>
</body>
</html>
