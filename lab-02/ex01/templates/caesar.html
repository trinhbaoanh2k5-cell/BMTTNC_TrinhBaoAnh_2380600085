<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caesar Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">CAESAR CIPHER</h2>
        
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">ENCRYPTION</div>
            <div class="card-body">
                <form method="POST" action="/encrypt">
                    <div class="form-group">
                        <label>Plain text:</label>
                        <input type="text" name="inputPlainText" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Key:</label>
                        <input type="number" name="inputKeyPlain" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Encrypt</button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-success text-white">DECRYPTION</div>
            <div class="card-body">
                <form method="POST" action="/decrypt">
                    <div class="form-group">
                        <label>Cipher text:</label>
                        <input type="text" name="inputCipherText" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Key:</label>
                        <input type="number" name="inputKeyCipher" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success">Decrypt</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
